---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoflow-worker
  namespace: autoflow
  labels:
    app: autoflow-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoflow-worker
  template:
    metadata:
      labels:
        app: autoflow-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/manish08k/autoflow-api:latest
          command:
            - celery
            - -A
            - workers.tasks.celery_app
            - worker
            - --loglevel=info
            - --queues=workflows,polling,maintenance
            - --concurrency=8
          envFrom:
            - configMapRef:
                name: autoflow-config
            - secretRef:
                name: autoflow-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoflow-beat
  namespace: autoflow
  labels:
    app: autoflow-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoflow-beat
  template:
    metadata:
      labels:
        app: autoflow-beat
    spec:
      containers:
        - name: beat
          image: ghcr.io/manish08k/autoflow-api:latest
          command:
            - celery
            - -A
            - workers.tasks.celery_app
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: autoflow-config
            - secretRef:
                name: autoflow-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
