---
apiVersion: v1
kind: Namespace
metadata:
  name: autoflow

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autoflow-config
  namespace: autoflow
data:
  APP_ENV: "production"
  APP_BASE_URL: "https://api.autoflow.io"
  REDIS_URL: "redis://redis.autoflow.svc.cluster.local:6379/0"
  CELERY_BROKER_URL: "redis://redis.autoflow.svc.cluster.local:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis.autoflow.svc.cluster.local:6379/2"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318"
  PROMETHEUS_ENABLED: "true"

---
# Template only — real values should come from sealed-secrets / external-secrets / CI in production.
apiVersion: v1
kind: Secret
metadata:
  name: autoflow-secrets
  namespace: autoflow
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://autoflow:CHANGE_ME@postgres.autoflow.svc.cluster.local:5432/autoflow"
  APP_SECRET_KEY: "CHANGE_ME_32_CHARS_MINIMUM"
  CREDENTIAL_ENCRYPTION_KEY: "CHANGE_ME_32_CHARS_MINIMUM"
